#spring.application.name=eurekaService

server:
  port: 8088

spring:
  application:
    name: eurekaService

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: "http://${eureka.instance.hostname}:${server.port}/eureka/"
