#spring.application.name=bookingService

#spring.application.name=salonService



# THIS MUST BE AT THE TOP LEVEL OR PROPERLY NESTED
spring:
  application:
    name: bookingService # Must be indented properly
  datasource:
    url: jdbc:postgresql://localhost:5432/bookingDB
    username: postgres
    password: ADMIN
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

    security:
      oauth2:
        client:
  server:
    port: 8084

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8088/eureka
