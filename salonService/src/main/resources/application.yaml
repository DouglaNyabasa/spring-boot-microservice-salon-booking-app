#spring.application.name=salonService

spring:
  application:
    name: salonService
  datasource:
    url: jdbc:postgresql://localhost:5432/salonDB
    username: postgres
    password: ADMIN
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

    security:
      oauth2:
        client:
server:
  port: 8081

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8088/eureka



